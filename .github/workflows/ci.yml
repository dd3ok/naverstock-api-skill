name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install lint tool
        run: python -m pip install --disable-pip-version-check ruff
      - name: Compile scripts
        run: python -m compileall -q scripts
      - name: Check whitespace
        shell: bash
        run: |
          set -euo pipefail

          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            git diff --check "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"
          else
            before="${{ github.event.before }}"
            if [[ "$before" =~ ^0+$ ]] || ! git cat-file -e "$before^{commit}" 2>/dev/null; then
              git show --check --pretty=format: --no-ext-diff "${{ github.sha }}"
            else
              git diff --check "$before" "${{ github.sha }}"
            fi
          fi
      - name: Check script help
        run: |
          for file in scripts/*.py; do
            python "$file" --help >/dev/null
          done
      - name: Run tests
        run: python -m unittest discover -s tests
      - name: Lint scripts and tests
        run: ruff check scripts tests
      - name: Smoke-test lightweight skill layout
        shell: bash
        run: |
          set -euo pipefail
          target="$(mktemp -d)/naverstock-web-api"
          mkdir -p "$target"
          cp -R SKILL.md LICENSE agents references scripts "$target/"
          python "$target/scripts/home.py" --help >/dev/null
          python "$target/scripts/foreign_stock.py" --help >/dev/null
          python "$target/scripts/search.py" --help >/dev/null
